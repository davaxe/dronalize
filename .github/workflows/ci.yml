name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync test environment
        run: uv sync --frozen --group test

      - name: Run tests
        run: uv run pytest tests -m "not slow and not dataset"

  all-extras:
    name: All extras
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync all-extras environment
        run: uv sync --frozen --group test --all-extras

      - name: Run tests with all extras
        run: uv run pytest tests -m "not slow and not dataset"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync coverage environment
        run: uv sync --frozen --group test --all-extras

      - name: Run tests with coverage
        run: >
          uv run coverage run -m pytest tests
          --junitxml=junit.xml
          -m "not slow and not dataset"

      - name: Build coverage reports
        if: always()
        run: |
          uv run coverage report -m
          uv run coverage xml
          uv run coverage html

      - name: Generate badges
        if: always()
        run: |
          uvx --with "genbadge[coverage]" genbadge coverage --local -i coverage.xml -o coverage-badge.svg
          uvx --with "genbadge[tests]" genbadge tests --local -i junit.xml -o tests-badge.svg

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            .coverage
            junit.xml
            coverage.xml
            coverage-badge.svg
            tests-badge.svg
            htmlcov/

  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ruff
            group: lint
            command: uv run ruff check .
            all_extras: true

          - name: Basedpyright
            group: typecheck
            command: uv run basedpyright src tests
            all_extras: true

          - name: Build package
            group: build
            command: uv build
            all_extras: false

          - name: Docs
            group: docs
            command: uv run zensical build --clean
            all_extras: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Sync environment with all extras
        if: ${{ matrix.all_extras }}
        run: uv sync --frozen --group ${{ matrix.group }} --all-extras

      - name: Sync environment
        if: ${{ !matrix.all_extras }}
        run: uv sync --frozen --group ${{ matrix.group }}

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

      - name: Upload distribution artifacts
        if: ${{ matrix.name == 'Build package' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
