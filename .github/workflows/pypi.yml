name: PyPi CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # Use CPU wheels for torch-cluster on CI
      - name: Configure pip find-links (CPU wheels)
        run: |
          mkdir -p ~/.pip
          printf "[global]\nfind-links = https://data.pyg.org/whl/torch-2.6.0+cpu.html\n" > ~/.pip/pip.conf

      - name: Install project (from pyproject.toml)
        run: |
          python -m pip install --upgrade pip
          # Base deps + dev tools + PyG addon (torch-cluster); finds CPU wheels via pip.conf
          pip install .[dev,pyg]

      - name: Download Data
        run: |
          wget -O synthD.zip "https://liuonline-my.sharepoint.com/:u:/g/personal/thewe60_liu_se/EfK1PKrQ3X9LgOd_8TSw1g0BINzDadmTxHF_RHKg_31dGw?e=SEKX9X&download=1"
          unzip -o synthD.zip -d ./data

      - name: Run PyTorch Training Loop
        run: |
          python train.py --config ci

      - name: Run Unit Tests
        run: |
          pytest -q
