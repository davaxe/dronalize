# Example config for one dataset using the explicit TOML-facing schema.
# This file is intended to be a real, loadable example.

[global.execution]
jobs = 4
chunksize = 64

[datasets.a43.loader]
input_len = 20
output_len = 60
sample_time = 0.1

[datasets.a43.loader.window]
size = 80
step = 2

[datasets.a43.loader.resampling]
up = 2
down = 1
method = "cubic"
max_gap = 4
sort = true
position_columns = ["x", "y"]

[[datasets.a43.loader.resampling.output_derivatives]]
order = 1
columns = ["vx", "vy"]

[[datasets.a43.loader.resampling.output_derivatives]]
order = 2
columns = ["ax", "ay"]

[datasets.a43.loader.filter]
mode = "extend"

[[datasets.a43.loader.filter.cleanup]]
type = "exclude"
categories = ["STATIC_OBJECT", "UNIMPORTANT"]

[[datasets.a43.loader.filter.scene]]
type = "min_agents"
minimum = 2

[[datasets.a43.loader.filter.agent]]
type = "frames"
frames = [19]
rule_id = "agent_frames"
tolerance = { kind = "combined", absolute = 1, relative = 0.05 }

[[datasets.a43.loader.filter.agent]]
type = "min_samples"
minimum = 8
rule_id = "sample_floor"

[datasets.a43.map]
min_distance = 1.0
interp_distance = 2.5
enabled = true
extraction = "circle"
radius = 60.0

[datasets.a43.writer]
schema = "positions_velocity_yaw"
precision = "float64"
offset_positions = true

[datasets.a43.writer.mds]
compression = "zstd:7"
hashes = ["sha1", "xxh64"]
size_limit = 33554432
exist_ok = true

[datasets.a43.split]
mode = "shuffled-time"
ratio = { train = 0.7, val = 0.2, test = 0.1 }
segments = 8
gap = 2
