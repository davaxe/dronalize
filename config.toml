# config.to - Only specify what you want to override

[global]

[global.execution]
parallel = true
workers = -1 # -1 for all available cores ( or remove)

[a43]

[a43.execution]
workers = 1

[a43.loader]
input_len = 25
output_len = 55
sample_time = 0.1

[a43.loader.filtering]
require_frames = [19]
filter_agent_category = ["STATIC_OBJECT"]

[a43.loader.window]
window_size = 80
step_size = 1

[a43.loader.extra_kwargs]
rebalance = true

[a43.loader.resampling]

[a43.map]
min_distance = 0.5
interp_distance = 1
include_map = false
