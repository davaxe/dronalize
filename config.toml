# Debug config for a single dataset override.
# This file intentionally uses only one dataset section and demonstrates
# most of the current override surface, including the new filter spec.

[a43.execution]
parallel = true
workers = 4
chunksize = 64

[a43.loader]
input_len = 20
output_len = 60
sample_time = 0.1

[a43.loader.window]
window_size = 80
step_size = 2

[a43.loader.resampling]
up = 2
down = 1
method = "cubic"
max_gap = 4
sort = true
position_columns = ["x", "y"]

[a43.loader.resampling.output_derivatives]
1 = ["vx", "vy"]
2 = ["ax", "ay"]

[a43.loader.extra_kwargs]
custom_flag = "debug"
emit_metrics = true

[a43.loader.filter]
mode = "merge"

[[a43.loader.filter.cleanup]]
type = "exclude_categories"
categories = ["STATIC_OBJECT", "UNIMPORTANT"]

[[a43.loader.filter.validate_scene]]
type = "min_agents"
minimum = 2

[[a43.loader.filter.validate_agent]]
type = "agent_frames"
frames = [19]
max_invalid_agents = 1
max_invalid_fraction = 0.05

[[a43.loader.filter.validate_agent]]
type = "min_agent_samples"
minimum = 8
max_invalid_agents = 1
max_invalid_fraction = 0.05

[a43.map]
min_distance = 1.0
interp_distance = 2.5
include_map = true

[a43.map.extraction]
mode = "circle"
radius = 60.0

[a43.writer]
scene_schema = "positions_velocity_yaw"
precision = "float64"
offset_positions = true

[a43.writer.mds]
compression = "zstd:7"
hashes = ["sha1", "xxh64"]
size_limit = 33554432
exist_ok = true

[a43.split.weights]
train = 0.7
val = 0.2
test = 0.1

[a43.split.strategy]
type = "shuffled_time_blocks"
segments = 8
gap = 2
