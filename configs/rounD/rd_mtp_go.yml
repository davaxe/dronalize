# General Description
experiment_name: MTP-GO
task: motion forecasting on roundabout

# Model Configuration
model:
  class: MTPGo
  module: mtp_go.model
  num_mixtures: 6
  encoder:
    gnn_layer: gat+
    num_inputs: 9
    num_hidden: 256
    num_layers: 1
    num_heads: 1
    dropout: 0.1
  decoder:
    gnn_layer: gat+
    num_hidden: 256
    num_layers: 2
    num_heads: 3
    dropout: 0.1
  motion_model:
    class: FirstOrderGreyNeuralODE
    step_size: 0.2
    solver: heun

# Lightning Module Configuration
litmodule:
  class: LitModel
  module: mtp_go.litmodule

# Data Module Configuration
datamodule:
  class: TrajDataModule
  module: dataloader
  batch_size: 100
  root: data
  name: rounD_nomap
  transform: CoordinateTransform

# Training Configuration
training:
  epochs: 200
  lr: 0.0005
  radius: 50
  teacher_forcing: 1.0
  decay_rate: 0.03
  clip: 1.0
