site_name: Dronalize
site_description: Trajectory data processing toolkit for autonomous driving datasets
repo_url: https://github.com/westny/dronalize
repo_name: westny/dronalize

theme:
  name: material
  palette:
    scheme: default
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_if_no_docstring: false
          paths:
            - .

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true
  - tables

nav:
  - Home:
      - index.md
      - Changelog: changelog.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - user-guide/index.md
      - Preprocessing: user-guide/preprocessing.md
      - Datasets:
          - user-guide/datasets/index.md
          - Drone Datasets: user-guide/datasets/drone.md
          - AV Datasets: user-guide/datasets/av.md
          - Pedestrian Datasets: user-guide/datasets/pedestrian.md
      - Data Loading: user-guide/data-loading.md
      - Modeling: user-guide/modeling.md
      - Training: user-guide/training.md
      - Metrics: user-guide/metrics.md
      - Visualization: user-guide/visualization.md
  - API Reference:
      - api/index.md
      - Core API: api/core.md
      - Config: api/config.md
      - Pipeline: api/pipeline.md
      - Datasets: api/datasets.md
      - Converters: api/converters.md
      - Execution: api/execution.md
      - Plot: api/plot.md
  - Community:
      - community/index.md
      - Contributing: community/contributing.md
      - Related Work: community/related-work.md
      - Citation: community/citation.md
      - License: community/license.md
