description: ETH and UCY datasets

datasets:
  eth: {include: true}
  hotel: {include: true}
  univ: {include: true}
  zara1: {include: true}
  zara2: {include: true}

# To get original samples as in https://github.com/agrimgupta92/sgan use:
# org_obs_len: 8
# org_pred_len: 12
# sample_freq: 2.5
# upsample: 1

# And for the split specific settings, use:
# require_all_valid: true
# multiple_targets_per_window: false
# min_pedestrian: 2
# window_skip: 1

dataset: ethucy
input_len: 8
output_len: 12
seed: 42
sample_freq: 2.5
upsample: 4

test_config:
  # If true, requires all positions in the sequence to be valid to consider a
  # sequence valid.
  require_all_valid: true
  # If true, allows multiple target pedestrians per sequence window, when
  # possible.
  multiple_targets_per_window: false
  # Minimum number of pedestrians in a sequence to consider it valid.
  min_pedestrian: 2
  # Number of samples between sliding windows in the sequence.
  window_skip: 1

train_config:
  require_all_valid: false
  multiple_targets_per_window: false
  min_pedestrian: 1
  window_skip: 1

val_config:
  require_all_valid: true
  multiple_targets_per_window: false
  min_pedestrian: 2
  window_skip: 1