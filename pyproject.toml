[build-system]
requires = ["uv_build>=0.10,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "preprocessing"
module-root = ""

[project]
name = "dronalize"
version = "1.3.0"
description = "Trajectory data processing toolkit for autonomous driving datasets"
authors = [
    { name = "Theodor Westny", email = "theodor.westny@liu.se" },
    { name = "David Axelsson", email = "david.axelsson@liu.se" },
]
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"

dependencies = [
    "numpy>=1.24.0",
    "polars>=1.0.0",
    "pyarrow>=14.0.0",
    "scipy>=1.10.0",
    "tqdm>=4.65.0",
    "utm>=0.7.0",
    "typing-extensions>=4.15.0",
]

[project.optional-dependencies]
# Plotting (map graphs, trajectories)
plot = ["altair>=5.0.0"]

# Dataset-specific extras
lyft = ["zarr<3", "numcodecs<=0.13.1"]
ad4che = ["opencv-python"]

# Minimal PyTorch dependency for the dataloader implementation
loader = ["torch>=2.0.0"]

# Full ML stack for running the example training pipeline
example = [
    "dronalize[loader]",
    "torchmetrics>=0.11.0",
    "torch_geometric>=2.3.0",
    "torch-cluster",
    "lightning>=2.0.0",
    "wandb>=0.15.0",
]

dev = [
    "pytest>=7.0",
    "scipy-stubs",
    "ipython",
    "dronalize[plot,lyft,ad4che]",
]
dev-example = ["dronalize[example,dev]"]

# All runtime extras (no dev/test tooling)
all = ["dronalize[loader,plot,lyft,ad4che]"]
# All runtime + dev/test tooling
all-dev = ["dronalize[all,dev]"]

# [tool.uv]
# find-links = ["https://data.pyg.org/whl/torch-2.6.0+cu124.html"]

[tool.uv.extra-build-dependencies]
torch-cluster = ["torch"]

[tool.pytest.ini_options]
testpaths = ["tests", "preprocessing/common", "preprocessing/core"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--doctest-modules", "-ra"]

[tool.ruff]
# Exclude proto compiled files from linting and formatting
extend-exclude = ["*_pb2.py", "*_pb2_grpc.py", "*_pb2.pyi", "protos/*"]
line-length = 100
preview = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203", "D213", "COM812", "PLR2004", "DOC201", "DOC501",
    "T201", "S101", "TRY003", "D100", "E501", "B008",
    "TD002", "TD003", "PLR0913", "PLR0917", "PLR0914",
    "DOC402", "CPY001", "D104", "TD005","S405", "S314",
]
