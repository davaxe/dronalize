[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dronalize"
version = "1.3.0"
description = "Trajectory prediction and preprocessing toolbox"
authors = [
    { name = "Theodor Westny", email = "theodor.westny@liu.se" },
    { name = "David Axelsson", email = "david.axelsson@liu.se" }
]
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"

dependencies = [
    "torch==2.6.0",
    "torch_geometric==2.6.1",
    "lightning==2.5.2",
    "wandb==0.21.0",
    "pandas==2.3.1",
    "pyarrow==21.0.0",
    "scikit-learn",
    "matplotlib",
    "tqdm",
    "utm==0.8.1",
    "osmium==4.0.2",
    "pyproj==3.7.1",
    "lark",
    # numpy by Python version
    "numpy==2.2.3; python_version < '3.11'",
    "numpy==2.2.6; python_version >= '3.11'",
    # scipy by Python version
    "scipy==1.15.2; python_version < '3.11'",
    "scipy==1.16.1; python_version >= '3.11'",
    # networkx by Python version
    "networkx==3.4.2; python_version < '3.11'",
    "networkx==3.5; python_version >= '3.11'",
    "polars>=1.37.1",
    "polars-splines>=0.1.2",
    "scipy-stubs>=1.15.3.0",
]

[project.optional-dependencies]
# PyG add-on; install with a wheel source (see commands below)
pyg = ["torch-cluster"]

# Dataset-specific extras
lyft = ["zarr>=2.18.2"]
ad4che = ["opencv-python"]

# Container-specific (headless versions for Docker/servers)
container = [
    "opencv-python-headless",
    "zarr>=2.18.2",
]

# Development tools
dev = [
    "pytest",
    "ruff",
    "pre-commit",  # For git hooks
    "mypy",       # Type checking
]

# Convenience combinations
all-datasets = ["zarr>=2.18.2", "opencv-python"]
dev-cuda = ["torch-cluster", "pytest", "ruff", "pre-commit", "mypy"]
all = [
    "torch-cluster",
    "zarr>=2.18.2",
    "opencv-python",
    "pytest",
    "ruff",
    "pre-commit",
    "mypy",
]

[tool.uv]
find-links = [
    "https://data.pyg.org/whl/torch-2.6.0+cu124.html",
]

[tool.uv.extra-build-dependencies]
torch-cluster = ["torch"]

# Don't install local packages - just manage dependencies
[tool.setuptools]
packages = []

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--disable-warnings",
    "-ra",
]

[tool.ruff]
# Exclude proto compiled files from linting and formatting
extend-exclude = ["*_pb2.py", "*_pb2_grpc.py", "*_pb2.pyi", "protos/*"]

[tool.ruff.lint]
select = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"*.py" = ["PLR2004","DOC201", "DOC501", "T201", "S101", "TRY003", "D100", "E501", "B008", "TD002", "TD003", "COM812", "PLR0913"]

# ---------------------------------------------------------------------------
# Installation instructions:
#
# Prerequisite: Install uv (https://docs.astral.sh/uv/getting-started/installation/)
#
# 1. Create a virtual environment and verify lockfile:
#    uv lock
#
# 2. Install dependencies (creates .venv automatically):
#    uv sync
#
# 3. Install with optional features (e.g. PyG support, dev tools):
#    uv sync --extra dev-cuda
#    # Or for specific extras:
#    uv sync --extra lyft --extra ad4che
#
# 4. Running commands:
#    uv run python train.py ...
#    uv run pytest
# ---------------------------------------------------------------------------
#
# ---------------------------------------------------------------------------