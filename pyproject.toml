[build-system]
requires = ["uv_build>=0.10,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "preprocessing"
module-root = ""

[project]
name = "dronalize"
version = "1.3.0"
description = "Trajectory data processing toolkit for autonomous driving datasets"
authors = [
    { name = "Theodor Westny", email = "theodor.westny@liu.se" },
    { name = "David Axelsson", email = "david.axelsson@liu.se" },
]
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"

dependencies = [
    "numpy>=1.24.0",
    "polars>=1.0.0",
    "pyarrow>=14.0.0",
    "scipy>=1.10.0",
    "tqdm>=4.65.0",
    "utm>=0.7.0",
    "osmium>=4.0.0",
]

[project.optional-dependencies]
# Plotting (map graphs, trajectories)
plot = ["matplotlib>=3.5.0", "altair>=5.0.0"]

# PyTorch integration (zero-copy conversion, datasets, etc.)
torch = ["torch>=2.0.0"]
pyg = ["torch>=2.0.0", "torch_geometric>=2.3.0", "torch-cluster"]

# Training stack (only needed for model training, not preprocessing)
train = [
    "dronalize[pyg]",
    "lightning>=2.0.0",
    "wandb>=0.15.0",
    "scikit-learn>=1.0.0",
    "mosaicml-streaming>=0.7.0",
]

# Dataset-specific extras
lyft = ["zarr<3", "numcodecs<=0.13.1"]
ad4che = ["opencv-python"]

# Container-specific (headless versions for Docker/servers)
container = ["opencv-python-headless"]

dev = [
    "pytest>=7.0",
    "scipy-stubs",
    "ipython",
]

all-datasets = ["dronalize[lyft,ad4che]"]
dev-cuda = ["dronalize[train,dev]"]
all = ["dronalize[train,plot,ad4che,lyft,dev]"]

# [tool.uv]
# find-links = ["https://data.pyg.org/whl/torch-2.6.0+cu124.html"]

[tool.uv.extra-build-dependencies]
torch-cluster = ["torch"]

[tool.pytest.ini_options]
testpaths = ["tests", "preprocessing/common", "preprocessing/core"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--doctest-modules", "-ra"]

[tool.ruff]
# Exclude proto compiled files from linting and formatting
extend-exclude = ["*_pb2.py", "*_pb2_grpc.py", "*_pb2.pyi", "protos/*"]
line-length = 100
preview = true

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203", "D213", "COM812", "PLR2004", "DOC201", "DOC501",
    "T201", "S101", "TRY003", "D100", "E501", "B008",
    "TD002", "TD003", "PLR0913", "PLR0917", "PLR0914",
    "DOC402", "CPY001", "D104", "TD005"
]
