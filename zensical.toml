[project]
site_name = "dronalize"
site_url = "https://westny.github.io/dronalize/"
site_description = "CLI-first preprocessing and scene generation for motion forecasting datasets."
site_author = "Theodor Westny, David Axelsson"
copyright = "&copy; 2026 Dronalize contributors"
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/westny/dronalize"
repo_name = "westny/dronalize"
extra_css = ["stylesheets/extra.css"]
nav = [
  { Home = "index.md" },

  { Start = [
    "start/index.md",
    { Installation = "start/installation.md" },
    { "First run (CLI)" = "start/first-run-cli.md" },
    { "Python entry" = "start/python-entry.md" },
    { "Adding datasets" = "start/adding-datasets.md" },
    { Changelog = "start/changelog.md" },
    { Citation = "start/citation.md" },
  ] },

  { Concepts = [
    "concepts/index.md",
    { Architecture = "concepts/architecture.md" },
    { "Configuration model" = "concepts/configuration-model.md" },
    { "Split strategies" = "concepts/split-strategies.md" },
    { "Screening scenes" = "concepts/screening.md" },
    { "Map processing" = "concepts/map-processing.md" },
    { Datasets = "concepts/datasets.md" },
    { "Lane-change sampling" = "concepts/lane-change-sampling.md" },
  ] },

  { "Data formats" = [
    "formats/index.md",
    { "Scene schema" = "formats/schema.md" },
    { Manifest = "formats/manifest.md" },
    { "Reading datasets" = "formats/reading.md" },
    { "Storage backends" = [
      "formats/backends/index.md",
      { "MDS backend" = "formats/backends/mds.md" },
      { "Pickle backend" = "formats/backends/pickle.md" },
      { "Null backend" = "formats/backends/null.md" },
    ] },
  ] },

  { "Configuration reference" = [
    "reference/configuration/index.md",
    { "[runtime] section" = "reference/configuration/runtime.md" },
    { "[scenes] section" = "reference/configuration/scenes.md" },
    { "[screening] section" = "reference/configuration/screening.md" },
    { "[map] section" = "reference/configuration/map.md" },
    { "[output] section" = "reference/configuration/output.md" },
    { "[split] section" = "reference/configuration/split.md" },
    { "[dataset] section" = "reference/configuration/dataset.md" },
  ] },

  { "Dataset reference" = [
    "reference/datasets/index.md",
    { a43 = "reference/datasets/a43.md" },
    { ad4che = "reference/datasets/ad4che.md" },
    { apolloscape = "reference/datasets/apolloscape.md" },
    { argoverse1 = "reference/datasets/argoverse1.md" },
    { argoverse2 = "reference/datasets/argoverse2.md" },
    { eth = "reference/datasets/eth.md" },
    { exid = "reference/datasets/exid.md" },
    { highd = "reference/datasets/highd.md" },
    { hotel = "reference/datasets/hotel.md" },
    { i80 = "reference/datasets/i80.md" },
    { ind = "reference/datasets/ind.md" },
    { interaction = "reference/datasets/interaction.md" },
    { lyft = "reference/datasets/lyft.md" },
    { nuscenes = "reference/datasets/nuscenes.md" },
    { opendd = "reference/datasets/opendd.md" },
    { round = "reference/datasets/round.md" },
    { sind = "reference/datasets/sind.md" },
    { unid = "reference/datasets/unid.md" },
    { univ = "reference/datasets/univ.md" },
    { us101 = "reference/datasets/us101.md" },
    { vod = "reference/datasets/vod.md" },
    { waymo = "reference/datasets/waymo.md" },
    { zara1 = "reference/datasets/zara1.md" },
    { zara2 = "reference/datasets/zara2.md" },
  ] },


  { "API reference" = [
    { Overview = "reference/api/index.md" },
    { "Core types" = [
      "reference/api/core/index.md",
      { Enums = "reference/api/core/categories-and-splits.md" },
      { "Scene models and schemas" = "reference/api/core/scene.md" },
      { "Map graphs" = "reference/api/core/maps.md" },
    ] },
    { Configuration = [
      "reference/api/config/index.md",
      { "Project configuration" = "reference/api/config/project.md" },
      { "Dataset models" = "reference/api/config/models/dataset.md" },
      { "Scene models" = "reference/api/config/models/scene.md" },
      { "Screening models" = "reference/api/config/models/screening.md" },
      { "Map models" = "reference/api/config/models/map.md" },
      { "Output models" = "reference/api/config/models/output.md" },
      { "Split models" = "reference/api/config/models/split.md" },
      { "Runtime models" = "reference/api/config/models/runtime.md" },
    ] },
    { Datasets = [
      "reference/api/datasets/index.md",
      { "Registry operations" = "reference/api/datasets/registry.md" },
      { "Dataset specs and capabilities" = "reference/api/datasets/descriptors.md" },
    ] },
    { Runtime = [
      "reference/api/runtime/index.md",
      { "Requests, plans, and results" = "reference/api/runtime/planning-and-runs.md" },
      { "Execution functions" = "reference/api/runtime/executor.md" },
    ] },
    { Processing = [
      "reference/api/processing/index.md",
      { Screening = "reference/api/processing/screening.md" },
      { Pipeline = "reference/api/processing/pipeline.md" },
      { "Map processing" = "reference/api/processing/maps.md" },
      { "Loader extension API" = "reference/api/processing/loading.md" },
    ] },
    { "I/O" = [
      "reference/api/io/index.md",
      { "Storage and manifests" = "reference/api/io/storage-and-manifests.md" },
      { Readers = "reference/api/io/readers.md" },
      { "Framework adapters" = "reference/api/io/adapters.md" },
      { "Backend extension API" = "reference/api/io/backends.md" },
    ] },
    { Plotting = [
      "reference/api/plot/index.md",
    ] },
  ] },
]

[project.theme]
variant = "modern"
font.text = "Source Sans 3"
font.code = "IBM Plex Mono"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.instant.preview",
  "navigation.path",
  "navigation.tracking",
  "navigation.top",
  "toc.follow",
  "search.highlight",
  "content.code.copy",
  "navigation.footer",
]

[project.theme.icon]
logo = "lucide/waypoints"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src/dronalize"]

[project.plugins.mkdocstrings.handlers.python.options]
allow_inspection = true
docstring_section_style = "list"
docstring_style = "auto"
inherited_members = false
line_length = 80
separate_signature = true
show_root_heading = true
show_symbol_type_heading = true
show_signature_annotations = true
show_source = true
show_symbol_type_toc = true
signature_crossrefs = true
show_if_no_docstring = false
merge_init_into_class = true
show_root_full_path = false
modernize_annotations = true
unwrap_annotated = true
filters = ["!^__.*__$", "!^_.*"]

[project.markdown_extensions.admonition]
[project.markdown_extensions.abbr]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.toc]
